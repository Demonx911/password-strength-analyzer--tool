<!DOCTYPE html>
<html>
<head>
  <title>Password Analyzer</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <h2>🔐 Password Security Analyzer</h2>

  <div class="input-box">
    <input type="password" id="pwd" placeholder="Enter password" oninput="check()">
    <span onclick="toggle()">👁️</span>
  </div>

  <div class="bar">
    <div id="strengthBar"></div>
  </div>

  <h3 id="result"></h3>
  <p id="time"></p>
  <p id="suggestion"></p>
</div>

<script src="script.js"></script>

</body>
</html>
